<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        /* Midnight Cyber Theme */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Changed from pure black to a deep violet/blue radial gradient */
            background: radial-gradient(circle at top left, #1e1b4b, #000000); 
            margin: 0;
            color: #ffffff;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #a5b4fc; /* Soft blue-violet heading */
            text-shadow: 0px 2px 10px rgba(165, 180, 252, 0.2);
        }

        .calculator {
            background: linear-gradient(145deg, #2a2d34, #23252b); /* Slate gray */
            padding: 30px;
            border-radius: 24px;
            box-shadow: 
                15px 15px 40px rgba(0, 0, 0, 0.9), 
                -5px -5px 20px rgba(99, 102, 241, 0.05); /* Slight purple glow on edge */
            border: 1px solid #3f4451;
            width: 320px;
        }

        #display {
            width: 100%;
            height: 80px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 40px;
            text-align: right;
            margin-bottom: 30px;
            border: none;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            background-color: #0d1117; /* Very dark midnight blue screen */
            color: #00ff00; /* Kept the glowing green text */
            text-shadow: 0 0 12px rgba(0, 255, 0, 0.7); 
            box-shadow: 
                inset 5px 5px 15px rgba(0,0,0,1), 
                inset -2px -2px 10px rgba(255,255,255,0.03);
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        button {
            padding: 18px 0;
            font-size: 22px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(145deg, #363a45, #2d3039); /* Dark metallic buttons */
            color: #e2e8f0;
            cursor: pointer;
            box-shadow: 
                5px 5px 10px rgba(0, 0, 0, 0.6), 
                -2px -2px 8px rgba(255, 255, 255, 0.05);
            transition: all 0.15s ease;
            font-weight: 600;
        }

        button:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: 
                inset 4px 4px 10px rgba(0, 0, 0, 0.7), 
                inset -2px -2px 5px rgba(255, 255, 255, 0.03);
        }

        button:hover {
            background: linear-gradient(145deg, #404552, #333742);
        }

        /* Operator Buttons - Changed to Electric Blue */
        .operator {
            color: #38bdf8; 
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* Number Buttons - Kept Green */
        .number {
            color: #22c55e; /* Vibrant Green */
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        .clear {
            color: #fb7185; /* Soft neon pink/red for clear */
            grid-column: span 2;
        }

        /* Equals Button - Kept Solid Green */
        .equal {
            color: #000000;
            background: linear-gradient(145deg, #10b981, #059669); /* Emerald green */
            box-shadow: 
                0px 5px 15px rgba(16, 185, 129, 0.3),
                inset 2px 2px 5px rgba(255, 255, 255, 0.4);
            grid-column: span 2;
        }
        
        .equal:hover {
            background: linear-gradient(145deg, #34d399, #10b981);
        }

        .equal:active {
            box-shadow: inset 4px 4px 10px rgba(4, 120, 87, 0.8);
        }
    </style>
</head>
<body>

    <h1>Simple Calculator</h1>

    <div class="calculator">
        <input type="text" id="display" disabled placeholder="0">
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="backspace()">x</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            
            <button class="number" onclick="appendToDisplay('7')">7</button>
            <button class="number" onclick="appendToDisplay('8')">8</button>
            <button class="number" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">*</button>
            
            <button class="number" onclick="appendToDisplay('4')">4</button>
            <button class="number" onclick="appendToDisplay('5')">5</button>
            <button class="number" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">−</button>
            
            <button class="number" onclick="appendToDisplay('1')">1</button>
            <button class="number" onclick="appendToDisplay('2')">2</button>
            <button class="number" onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button class="number" onclick="appendToDisplay('0')">0</button>
            <button class="number" onclick="appendToDisplay('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            display.value += input;
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                if (display.value === '') return;
                
                const result = eval(display.value);
                
                if (!isFinite(result)) {
                    display.value = "Error";
                } else {
                    display.value = result;
                }
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
